spring:
  g11n:
    base-directory: classpath:i18n-yaml
    file-base-name: messages
    file-extension: yml
    locale-separator: _
    default-locale: en
    locales:
      - en
      - ru
      - zh
      - de
      - fr
    cache:
      size: 2000
      enable-statistics: true
    type: YAML
    validation:
      enabled: true
      fail-on-error: false

  config:
    activate:
      on-profile: yaml
